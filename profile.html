<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilim - Nereye Gitsek?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="profile.css">
</head>
<body>

    <div class="floating-shapes">
        <div class="shape"></div><div class="shape"></div><div class="shape"></div><div class="shape"></div>
    </div>

    <div class="profile-container">
        <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Ana Sayfaya Dön</a>
        <div class="profile-card">
            <div class="avatar-section">
                <img id="avatarPreview" src="https://placehold.co/120x120/ff6b35/white?text=Avatar" alt="Avatar">
                <i class="fas fa-camera avatar-edit-icon"></i>
            </div>
            <h2>Profilim</h2>
            <form id="profileForm">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="fullName" placeholder="Ad Soyad">
                </div>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="profileEmail" disabled>
                </div>
                <div class="input-group">
                    <i class="fas fa-image"></i>
                    <input type="url" id="avatarUrl" placeholder="Avatar URL'si (opsiyonel)">
                </div>
                <button type="submit" class="save-btn"><i class="fas fa-save"></i> Kaydet</button>
            </form>
            <p id="profileMsg" class="msg"></p>
        </div>
    </div>

    <script src="profile.js"></script>
</body>
</html>
